<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gol Bahasa Piala Dunia</title>
<style>
  :root {
    --green: #22c55e;
    --green-dark: #16a34a;
    --blue: #3b82f6;
    --yellow: #facc15;
    --red: #ef4444;
    --gold: #FFD700;
  }
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Arial', 'Comic Sans MS', sans-serif;
    background: linear-gradient(135deg, #dcfce7 0%, #dbeafe 50%, #fef9c3 100%);
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  .title-font {
    font-family: 'Arial', 'Comic Sans MS', sans-serif;
    font-weight: 700;
  }
  
  /* Stadium Background Pattern */
  .stadium-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    opacity: 0.15;
    pointer-events: none;
  }
  
  .crowd-layer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: repeating-linear-gradient(
      90deg,
      #1e40af 0px,
      #1e40af 8px,
      #3b82f6 8px,
      #3b82f6 16px,
      #60a5fa 16px,
      #60a5fa 24px,
      #fef3c7 24px,
      #fef3c7 32px
    );
  }
  
  /* Buttons */
  .btn-game {
    transition: all 0.2s ease;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    cursor: pointer;
    border: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-game:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 0 rgba(0,0,0,0.2);
  }
  .btn-game:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.2);
  }
  
  .btn-game:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  
  /* Animations */
  .card-pop {
    animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  
  .ball-spin {
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  
  .ball-bounce {
    animation: bounce 1.5s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  
  .goal-animation {
    animation: goal 1.2s ease-out forwards;
  }
  @keyframes goal {
    0% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.3) translateY(-50px) rotate(360deg); opacity: 1; }
    100% { transform: scale(0.5) translateY(-120px) rotate(720deg); opacity: 0; }
  }
  
  .miss-animation {
    animation: miss 0.8s ease-out forwards;
  }
  @keyframes miss {
    0% { transform: translateX(0) rotate(0deg); }
    25% { transform: translateX(-30px) rotate(-25deg); }
    75% { transform: translateX(30px) rotate(25deg); }
    100% { transform: translateX(0) rotate(0deg); opacity: 0.3; }
  }
  
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: confetti-fall 3s linear infinite;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  
  .player-run {
    animation: run 1s ease-in-out;
  }
  @keyframes run {
    0% { transform: translateX(-100px); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(0); opacity: 1; }
  }
  
  .trophy-shine {
    animation: shine 2s ease-in-out infinite;
  }
  @keyframes shine {
    0%, 100% { filter: brightness(1) drop-shadow(0 0 10px var(--gold)); }
    50% { filter: brightness(1.5) drop-shadow(0 0 30px var(--gold)); }
  }
  
  .mascot-wave {
    animation: wave 2s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes wave {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }
  
  .option-card {
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .option-card:hover:not(:disabled) {
    transform: scale(1.05);
  }
  
  .progress-bar {
    transition: width 0.5s ease;
  }
  
  .shake {
    animation: shake 0.5s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
  
  .dragging {
    opacity: 0.5;
  }
  
  .drop-zone {
    border: 3px dashed #94a3b8;
    min-height: 70px;
  }
  .drop-zone.hover {
    border-color: var(--green);
    background-color: #dcfce7;
  }
  
  /* Layout */
  .container {
    max-width: 1024px;
    margin: 0 auto;
    padding: 16px;
  }
  
  .header {
    background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
    color: white;
    padding: 12px 16px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  
  .header-content {
    max-width: 1024px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  
  .score-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 9999px;
    padding: 8px 16px;
    backdrop-filter: blur(10px);
  }
  
  .card {
    background: white;
    border-radius: 24px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    padding: 24px;
  }
  
  @media (max-width: 640px) {
    .card { padding: 16px; }
    .grid-cols-md-3 { grid-template-columns: repeat(2, 1fr) !important; }
    .text-8xl { font-size: 4rem; }
    .text-7xl { font-size: 3.5rem; }
  }
  
  .grid {
    display: grid;
    gap: 12px;
  }
  
  .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
  .grid-cols-md-3 { grid-template-columns: repeat(3, 1fr); }
  
  .flex { display: flex; }
  .flex-wrap { flex-wrap: wrap; }
  .items-center { align-items: center; }
  .justify-center { justify-content: center; }
  .justify-between { justify-content: space-between; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .gap-4 { gap: 16px; }
  
  .text-center { text-align: center; }
  .text-left { text-align: left; }
  .font-bold { font-weight: 700; }
  .text-xs { font-size: 0.75rem; }
  .text-sm { font-size: 0.875rem; }
  .text-lg { font-size: 1.125rem; }
  .text-xl { font-size: 1.25rem; }
  .text-2xl { font-size: 1.5rem; }
  .text-3xl { font-size: 1.875rem; }
  .text-4xl { font-size: 2.25rem; }
  .text-5xl { font-size: 3rem; }
  .text-6xl { font-size: 3.75rem; }
  .text-7xl { font-size: 4.5rem; }
  .text-8xl { font-size: 6rem; }
  
  @media (max-width: 640px) {
    .text-md-3xl { font-size: 1.5rem; }
    .text-md-sm { font-size: 0.875rem; }
    .text-md-xl { font-size: 1rem; }
    .text-md-2xl { font-size: 1.25rem; }
    .text-md-4xl { font-size: 2rem; }
    .text-md-7xl { font-size: 3.5rem; }
    .text-md-8xl { font-size: 4.5rem; }
  }
  
  .mb-1 { margin-bottom: 4px; }
  .mb-2 { margin-bottom: 8px; }
  .mb-3 { margin-bottom: 12px; }
  .mb-4 { margin-bottom: 16px; }
  .mb-6 { margin-bottom: 24px; }
  .mt-2 { margin-top: 8px; }
  .mt-3 { margin-top: 12px; }
  .mt-4 { margin-top: 16px; }
  .mt-6 { margin-top: 24px; }
  .mr-1 { margin-right: 4px; }
  .mr-2 { margin-right: 8px; }
  .ml-2 { margin-left: 8px; }
  .px-3 { padding-left: 12px; padding-right: 12px; }
  .px-4 { padding-left: 16px; padding-right: 16px; }
  .px-5 { padding-left: 20px; padding-right: 20px; }
  .px-6 { padding-left: 24px; padding-right: 24px; }
  .px-8 { padding-left: 32px; padding-right: 32px; }
  .py-2 { padding-top: 8px; padding-bottom: 8px; }
  .py-3 { padding-top: 12px; padding-bottom: 12px; }
  .py-4 { padding-top: 16px; padding-bottom: 16px; }
  .p-3 { padding: 12px; }
  .p-4 { padding: 16px; }
  .p-6 { padding: 24px; }
  
  .rounded-xl { border-radius: 12px; }
  .rounded-2xl { border-radius: 16px; }
  .rounded-3xl { border-radius: 24px; }
  .rounded-full { border-radius: 9999px; }
  
  .hidden { display: none !important; }
  .block { display: block; }
  .inline-block { display: inline-block; }
  .relative { position: relative; }
  .absolute { position: absolute; }
  .overflow-hidden { overflow: hidden; }
  
  .w-full { width: 100%; }
  .h-3 { height: 12px; }
  .min-h-screen { min-height: 100vh; }
  .min-h-16 { min-height: 64px; }
  
  .opacity-20 { opacity: 0.2; }
  .opacity-30 { opacity: 0.3; }
  .opacity-90 { opacity: 0.9; }
  
  /* Field */
  .field-container {
    background: linear-gradient(to bottom, #87ceeb 0%, #90ee90 40%, #32cd32 100%);
    border-radius: 24px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    padding: 16px;
    position: relative;
    overflow: hidden;
    min-height: 450px;
  }
  
  .field-lines {
    position: absolute;
    inset: 0;
    opacity: 0.2;
  }
  
  /* Colors */
  .bg-white { background: white; }
  .bg-green-500 { background: #22c55e; }
  .bg-green-600 { background: #16a34a; }
  .bg-blue-500 { background: #3b82f6; }
  .bg-blue-600 { background: #2563eb; }
  .bg-slate-400 { background: #94a3b8; }
  .bg-slate-500 { background: #64748b; }
  .bg-slate-800 { background: #1e293b; }
  .bg-yellow-400 { background: #facc15; }
  .bg-orange-400 { background: #fb923c; }
  .bg-blue-50 { background: #eff6ff; }
  .bg-slate-200 { background: #e2e8f0; }
  
  .bg-gradient-to-r { background: linear-gradient(to right, var(--tw-gradient-stops)); }
  .bg-gradient-to-br { background: linear-gradient(to bottom right, var(--tw-gradient-stops)); }
  .from-green-400 { --tw-gradient-from: #4ade80; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }
  .to-blue-500 { --tw-gradient-to: #3b82f6; }
  .from-blue-400 { --tw-gradient-from: #60a5fa; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }
  .to-blue-500 { --tw-gradient-to: #3b82f6; }
  .from-yellow-400 { --tw-gradient-from: #facc15; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }
  .to-orange-400 { --tw-gradient-to: #fb923c; }
  .from-yellow-100 { --tw-gradient-from: #fef9c3; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }
  .to-orange-100 { --tw-gradient-to: #fed7aa; }
  .from-blue-50 { --tw-gradient-from: #eff6ff; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }
  .to-green-50 { --tw-gradient-to: #f0fdf4; }
  
  .text-white { color: white; }
  .text-slate-800 { color: #1e293b; }
  .text-slate-600 { color: #475569; }
  .text-slate-500 { color: #64748b; }
  .text-slate-400 { color: #94a3b8; }
  .text-green-600 { color: #16a34a; }
  .text-green-700 { color: #15803d; }
  .text-blue-700 { color: #1d4ed8; }
  .text-yellow-500 { color: #eab308; }
  .text-yellow-300 { color: #fde047; }
  .text-red-600 { color: #dc2626; }
  .text-orange-600 { color: #ea580c; }
  
  .back-blur { backdrop-filter: blur(8px); }
  .bg-white\/90 { background: rgba(255,255,255,0.9); }
  .bg-white\/20 { background: rgba(255,255,255,0.2); }
  
  .border-4 { border-width: 4px; }
  .border-b-2 { border-bottom-width: 2px; }
  .border-white { border-color: white; }
  .border-yellow-400 { border-color: #facc15; }
  .border-slate-400 { border-color: #94a3b8; }
  
  .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
  .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
  
  .icon {
    display: inline-block;
    vertical-align: middle;
  }
  
  .space-y-2 > * + * { margin-top: 8px; }
  
  .cursor-move { cursor: move; }
</style>
</head>
