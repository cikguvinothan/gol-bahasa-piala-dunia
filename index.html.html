<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gol Bahasa Piala Dunia Pro - SMK BUD2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Poppins',Arial;background:#0f172a;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px;overflow-x:hidden}.stadium{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at center,#1e3a8a 0%,#0f172a 70%);z-index:-2}.stadium::before{content:'';position:absolute;width:200%;height:200%;top:-50%;left:-50%;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="rgba(255,255,255,0.08)"/></svg>');animation:stars 60s linear infinite}@keyframes stars{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.game{width:100%;max-width:900px;background:rgba(255,255,255,0.96);backdrop-filter:blur(10px);border-radius:30px;padding:30px;box-shadow:0 30px 90px rgba(0,0,0,.5);border:2px solid rgba(255,215,0,0.3);position:relative;z-index:1}.trophy{font-size:6rem;animation:float 3s ease-in-out infinite;display:inline-block}@keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-20px) rotate(5deg)}}.head{text-align:center;margin-bottom:20px}.head h1{font-size:2.5rem;font-weight:900;background:linear-gradient(45deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:10px 0}.kredit{font-size:0.9rem;color:#334155;margin-top:10px}.kredit strong{color:#1e3a8a}.logo-sekolah{width:80px;height:80px;border-radius:50%;border:3px solid #FFD700;margin:10px auto;background:#fff;object-fit:contain;box-shadow:0 5px 15px rgba(0,0,0,0.2)}.score{background:linear-gradient(45deg,#28a745,#20c997);color:#fff;padding:12px 25px;border-radius:50px;font-weight:bold;font-size:1.1rem;box-shadow:0 5px 15px rgba(40,167,69,0.4);display:inline-block}.btn{background:linear-gradient(45deg,#007bff,#0056b3);color:#fff;border:none;padding:18px 50px;font-size:1.3rem;border-radius:50px;cursor:pointer;margin:10px;font-weight:700;box-shadow:0 8px 20px rgba(0,123,255,0.4);transition:all.3s}.btn:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,123,255,0.6)}.btn-hijau{background:linear-gradient(45deg,#28a745,#20c997)}.word{background:linear-gradient(45deg,#ffc107,#ff9800);border:none;padding:16px 24px;margin:8px;border-radius:15px;cursor:pointer;font-size:1.3rem;font-weight:bold;color:#1e3a8a;box-shadow:0 5px 15px rgba(255,193,7,0.3);transition:all.2s}.word:hover{transform:scale(1.05)}.word:disabled{background:#ccc;opacity:.4;transform:scale(1)}.box{border:3px dashed #007bff;min-height:100px;padding:20px;margin:25px 0;border-radius:15px;background:rgba(248,249,250,0.8);font-size:1.4rem;font-weight:bold;color:#1e3c72}.sword{background:linear-gradient(45deg,#28a745,#20c997);color:#fff;padding:12px 18px;margin:6px;border-radius:12px;display:inline-block;cursor:pointer;box-shadow:0 4px 10px rgba(40,167,69,0.3)}.q{font-size:1.4rem;margin:25px 0;text-align:center;font-weight:700;color:#1e3a8a}.opt{background:#fff;border:3px solid #007bff;padding:18px;margin:12px 0;width:100%;text-align:left;font-size:1.1rem;border-radius:15px;cursor:pointer;font-weight:600;transition:all.2s}.opt:hover{background:#007bff;color:#fff;transform:translateX(10px)}.pemain-3d{display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap}.pemain{width:100px;height:100px;border-radius:50%;border:4px solid #FFD700;box-shadow:0 10px 30px rgba(0,0,0,0.3);animation:bounce 2s ease-in-out infinite;object-fit:cover;background:linear-gradient(45deg,#007bff,#00d4ff);display:flex;align-items:center;justify-content:center;font-size:3rem}@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}.pemain:nth-child(2){animation-delay:.3s}.pemain:nth-child(3){animation-delay:.6s}.sijil{border:10px solid #FFD700;background:linear-gradient(135deg,#fff 0%,#fffbeb 100%);padding:40px;text-align:center;border-radius:20px;position:relative}.sijil::before{content:'🏆';position:absolute;font-size:8rem;opacity:0.05;top:50%;left:50%;transform:translate(-50%,-50%)}.sijil h2{font-size:2.5rem;color:#1e3a8a;margin:20px 0;font-weight:900}.sijil .nama{font-size:2rem;color:#dc2626;font-weight:900;border-bottom:3px solid #FFD700;display:inline-block;padding:10px 40px;margin:20px 0}.input-nama{padding:15px;font-size:1.2rem;border:3px solid #007bff;border-radius:15px;width:80%;max-width:400px;text-align:center;margin:20px 0}.confetti{position:fixed;width:10px;height:10px;background:#FFD700;top:-10px;animation:confetti-fall 3s linear forwards;z-index:999}@keyframes confetti-fall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}
@media print{body *{visibility:hidden}.sijil,.sijil *{visibility:visible}.sijil{position:absolute;left:0;top:0;width:100%;border:5px solid #FFD700}}
</style>
</head>
<body>
<div class="stadium"></div>
<div class="game">
<div class="head">
  <img src="logo.png" alt="Logo SMK BUD 2" class="logo-sekolah" onerror="this.style.display='none'">
  <div class="trophy">🏆</div>
  <h1>GOL BAHASA PIALA DUNIA</h1>
  <div class="kredit">Disediakan oleh: <strong>Vinothan S.Ramayah</strong><br>GKMP Bahasa, SMK Bandar Utama Damansara 2</div>
  <div style="margin-top:15px"><span class="score">⭐ Skor: <span id="sc">0</span></span></div>
</div>
<div id="app"></div>
</div>

<audio id="gol" src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_6e7a2d6a2b.mp3"></audio>
<audio id="bgm" src="https://cdn.pixabay.com/download/audio/2022/11/22/audio_febc508520.mp3" loop></audio>

<script>
let lv=0,sc=0,sent=[],namaMurid='';
const L=[{t:"Level 1: Huruf Besar",q:"Pilih ayat yang menggunakan huruf besar dengan betul:",o:["saya suka makan nasi.","Saya Suka Makan Nasi.","Saya suka makan nasi.","saya Suka makan Nasi."],a:2},{t:"Level 2: Suku Kata",q:"Berapa suku kata dalam perkataan 'SEKOLAH'?",o:["2","3","4","5"],a:1},{t:"Level 3: Susun Ayat",q:"Klik perkataan ikut urutan:",w:["sekolah","Ali","pergi","ke"],a:"Ali pergi ke sekolah"},{t:"Level 4: Lawan Kata",q:"Apakah lawan kata bagi 'BESAR'?",o:["Tinggi","Kecil","Panjang","Lebar"],a:1},{t:"Level 5: Sinonim",q:"Apakah sinonim bagi 'CANTIK'?",o:["Hodoh","Jelita","Buruk","Comot"],a:1}];

function play(s){document.getElementById(s).play().catch(e=>{})}
function confetti(){for(let i=0;i<50;i++){let c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=`hsl(${Math.random()*360},100%,50%)`;c.style.animationDelay=Math.random()*2+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),3000)}}
function start(){lv=0;sc=0;play('bgm');upSc();show()}
function upSc(){document.getElementById('sc').innerText=sc}
function show(){if(lv>=L.length){mintaNama();return}const l=L[lv];let h=`<div style="text-align:center"><h2 style="color:#28a745;margin-bottom:10px;font-size:1.8rem">${l.t}</h2><div class="q">${l.q}</div>`;if(l.w){sent=[];h+=`<div class="box" id="box">Klik perkataan di bawah...</div><div>`;l.w.forEach(w=>{h+=`<button class="word" onclick="addW('${w}',this)">${w}</button>`});h+=`</div><br><button class="btn" onclick="checkS()">⚽ Semak Jawapan</button><button class="btn" style="background:#6c757d" onclick="resetS()">🔄 Padam Semua</button>`}else{l.o.forEach((o,i)=>{h+=`<button class="opt" onclick="checkA(${i})">${o}</button>`})}h+=`</div>`;document.getElementById('app').innerHTML=h}
function addW(w,b){sent.push(w);b.disabled=true;ren()}
function ren(){const b=document.getElementById('box');if(sent.length==0){b.innerHTML='Klik perkataan di bawah...'}else{b.innerHTML=sent.map((w,i)=>`<span class="sword" onclick="delW(${i})">${w}</span>`).join(' ')}}
function delW(i){const w=sent.splice(i,1)[0];ren();document.querySelectorAll('.word').forEach(b=>{if(b.innerText===w&&b.disabled){b.disabled=false}})}
function resetS(){sent=[];ren();document.querySelectorAll('.word').forEach(b=>b.disabled=false)}
function checkS(){if(sent.join(' ')===L[lv].a){sc+=20;upSc();play('gol');confetti();alert('GOOOL! ⚽');lv++;setTimeout(show,500)}else{alert('Cuba lagi! Klik perkataan hijau untuk padam.')}}
function checkA(c){if(c===L[lv].a){sc+=20;upSc();play('gol');confetti();alert('GOOOL! ⚽');lv++;setTimeout(show,500)}else{alert('Cuba lagi!')}}
function mintaNama(){document.getElementById('bgm').pause();confetti();document.getElementById('app').innerHTML=`<div style="text-align:center"><div style="font-size:5rem">🏆</div><h2 style="color:#28a745;font-size:2rem">TAHNIAH! ANDA JUARA!</h2><p style="font-size:1.3rem;margin:20px 0">Skor Akhir: <strong>${sc}/100</strong></p><p>Masukkan nama anda untuk jana Sijil Digital:</p><input type="text" id="namaInput" class="input-nama" placeholder="Contoh: Ali Bin Abu"><br><button class="btn btn-hijau" onclick="janaSijil()">🎓 Jana Sijil Saya</button></div>`}
function janaSijil(){namaMurid=document.getElementById('namaInput').value||'Pelajar Cemerlang';final()}
function final(){document.getElementById('app').innerHTML=`<div class="sijil"><img src="logo.png" style="width:80px;margin:0 auto" onerror="this.style.display='none'"><h2>SIJIL PENGHARGAAN</h2><p style="font-size:1.2rem">Dengan sukacitanya dianugerahkan kepada</p><div class="nama">${namaMurid}</div><p style="font-size:1.1rem">kerana telah berjaya menamatkan</p><h3 style="color:#1e3a8a;margin:10px 0">GOL BAHASA PIALA DUNIA</h3><p>dengan skor <strong>${sc}/100</strong></p><div style="margin-top:40px;font-size:0.9rem"><p><strong>Vinothan S.Ramayah</strong><br>GKMP Bahasa<br>SMK Bandar Utama Damansara 2</p><p style="margin-top:20px">Tarikh: ${new Date().toLocaleDateString('ms-MY')}</p></div></div><div style="text-align:center;margin-top:20px"><button class="btn btn-hijau" onclick="window.print()">🖨️ Cetak Sijil</button><button class="btn" onclick="start()">🔄 Main Semula</button></div>`}
document.getElementById('app').innerHTML=`<div style="text-align:center;padding:20px 0"><div class="pemain-3d"><div class="pemain">⚽</div><div class="pemain">🥅</div><div class="pemain">🏃</div></div><h2 style="color:#1e3a8a;margin:20px 0;font-size:2rem">Selamat Datang Juara!</h2><p style="margin:20px 0;font-size:1.2rem">Saya BolaComel, jom jaringkan gol sambil belajar BM!</p><button class="btn" onclick="start()">🚀 MULA PERLAWANAN</button></div>`;
</script>
</body>
</html>
