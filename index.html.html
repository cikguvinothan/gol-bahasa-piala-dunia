<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gol Bahasa Piala Dunia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#1e3c72,#2a5298);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px}.game{width:100%;max-width:800px;background:#fff;border-radius:20px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.score{background:#28a745;color:#fff;padding:10px 20px;border-radius:50px;font-weight:bold}.btn{background:#007bff;color:#fff;border:none;padding:15px 40px;font-size:1.2rem;border-radius:50px;cursor:pointer;margin:10px}.word{background:#ffc107;border:none;padding:14px 20px;margin:6px;border-radius:12px;cursor:pointer;font-size:1.2rem;font-weight:bold}.word:disabled{background:#ccc;opacity:.4}.box{border:3px dashed #007bff;min-height:80px;padding:15px;margin:20px 0;border-radius:12px;background:#f8f9fa;font-size:1.3rem;font-weight:bold;color:#1e3c72}.sword{background:#28a745;color:#fff;padding:10px 14px;margin:4px;border-radius:10px;display:inline-block;cursor:pointer}.q{font-size:1.3rem;margin:20px 0;text-align:center}.opt{background:#f8f9fa;border:2px solid #007bff;padding:15px;margin:10px 0;width:100%;text-align:left;font-size:1rem;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<div class="game">
<div class="head"><h2 style="color:#1e3c72">Gol Bahasa Piala Dunia<br><small>SMK BUDI 2</small></h2><div class="score">⭐ <span id="sc">0</span></div></div>
<div id="app"></div>
</div>
<script>
let lv=0,sc=0,sent=[];const L=[{t:"Level 1: Huruf Besar",q:"Pilih ayat yang menggunakan huruf besar dengan betul:",o:["saya suka makan nasi.","Saya Suka Makan Nasi.","Saya suka makan nasi.","saya Suka makan Nasi."],a:2},{t:"Level 2: Suku Kata",q:"Berapa suku kata dalam perkataan 'SEKOLAH'?",o:["2","3","4","5"],a:1},{t:"Level 3: Susun Ayat",q:"Klik perkataan ikut urutan:",w:["sekolah","Ali","pergi","ke"],a:"Ali pergi ke sekolah"},{t:"Level 4: Lawan Kata",q:"Apakah lawan kata bagi 'BESAR'?",o:["Tinggi","Kecil","Panjang","Lebar"],a:1},{t:"Level 5: Sinonim",q:"Apakah sinonim bagi 'CANTIK'?",o:["Hodoh","Jelita","Buruk","Comot"],a:1}];
function start(){lv=0;sc=0;upSc();show()}
function upSc(){document.getElementById('sc').innerText=sc}
function show(){if(lv>=L.length){final();return}const l=L[lv];let h=`<div style="text-align:center"><h2 style="color:#28a745;margin-bottom:10px">${l.t}</h2><div class="q">${l.q}</div>`;if(l.w){sent=[];h+=`<div class="box" id="box">Klik perkataan di bawah...</div><div>`;l.w.forEach(w=>{h+=`<button class="word" onclick="addW('${w}',this)">${w}</button>`});h+=`</div><br><button class="btn" onclick="checkS()">Semak Jawapan</button><button class="btn" style="background:#6c757d" onclick="resetS()">Padam Semua</button>`}else{l.o.forEach((o,i)=>{h+=`<button class="opt" onclick="checkA(${i})">${o}</button>`})}h+=`</div>`;document.getElementById('app').innerHTML=h}
function addW(w,b){sent.push(w);b.disabled=true;ren()}
function ren(){const b=document.getElementById('box');if(sent.length==0){b.innerHTML='Klik perkataan di bawah...'}else{b.innerHTML=sent.map((w,i)=>`<span class="sword" onclick="delW(${i})">${w}</span>`).join(' ')}}
function delW(i){const w=sent.splice(i,1)[0];ren();document.querySelectorAll('.word').forEach(b=>{if(b.innerText===w&&b.disabled){b.disabled=false}})}
function resetS(){sent=[];ren();document.querySelectorAll('.word').forEach(b=>b.disabled=false)}
function checkS(){if(sent.join(' ')===L[lv].a){sc+=20;upSc();alert('GOOOL! ⚽');lv++;setTimeout(show,500)}else{alert('Cuba lagi! Klik perkataan hijau untuk padam.')}}
function checkA(c){if(c===L[lv].a){sc+=20;upSc();alert('GOOOL! ⚽');lv++;setTimeout(show,500)}else{alert('Cuba lagi!')}}
function final(){document.getElementById('app').innerHTML=`<div style="text-align:center"><div style="font-size:5rem">🏆</div><h2 style="color:#28a745">TAHNIAH!</h2><p style="font-size:1.2rem;margin:20px 0">Anda Pemain Terbaik Bahasa!</p><p style="font-size:1.5rem;font-weight:bold">Skor: ${sc}/100</p><p style="margin:20px 0">SMK Bandar Utama Damansara 2</p><button class="btn" onclick="start()">Main Semula</button></div>`}
document.getElementById('app').innerHTML=`<div style="text-align:center;padding:20px 0"><div style="font-size:4rem">⚽🏆</div><h2 style="color:#1e3c72;margin:20px 0;font-size:2rem">Selamat Datang!</h2><p style="margin:20px 0;font-size:1.1rem">Saya BolaComel, jom main bola dan belajar BM!</p><button class="btn" onclick="start()">Mula Main</button></div>`;
</script>
</body>
</html>
